name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1
  RUST_TOOLCHAIN: nightly-2025-12-04
  CARGO_XWIN_VERSION: 0.20.2

jobs:
  # ---------------------------------------------------------------------------
  # 1. Determine the next semantic version (dry-run). Skip everything if the
  #    commit history since the last tag does not warrant a release.
  # ---------------------------------------------------------------------------
  decide:
    runs-on: ubuntu-24.04
    outputs:
      release: ${{ steps.dry.outputs.release }}
      version: ${{ steps.dry.outputs.version }}
      tag: ${{ steps.dry.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Lint commit messages
        if: github.event_name == 'push'
        run: |
          npx --yes @commitlint/cli@19 \
            --from ${{ github.event.before }} \
            --to ${{ github.event.after }} \
            --verbose

      - name: Install release deps
        run: pnpm install --frozen-lockfile=false

      - name: Compute next version (dry run)
        id: dry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          npx semantic-release --dry-run --no-ci 2>&1 | tee /tmp/sr.log || true
          version=$(grep -oE 'next release version is [0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?' /tmp/sr.log \
            | tail -1 | awk '{print $NF}')
          if [ -z "$version" ]; then
            echo "No release required."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Next version: $version"
          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 2. Build the React frontend with the resolved version stamped in.
  # ---------------------------------------------------------------------------
  build-frontend:
    needs: decide
    if: needs.decide.outputs.release == 'true'
    runs-on: ubuntu-24.04
    env:
      VITE_PUBLIC_REACT_VIRTUOSO_LICENSE_KEY: ${{ secrets.PUBLIC_REACT_VIRTUOSO_LICENSE_KEY }}
      VITE_CDT_SHARED_API_BASE: ${{ secrets.CDT_SHARED_API_BASE }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install cargo-edit
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: cargo-edit
          git: https://github.com/killercup/cargo-edit
          rev: 96a3879fe3bafda6d0f943b642997fbf03e235cd # v0.13.9

      - name: Apply version
        run: node scripts/release/apply-version.js ${{ needs.decide.outputs.version }}

      - name: Install deps
        run: pnpm install

      - name: Lint frontend
        run: cd packages/local-web && npm run lint

      - name: Type check frontend
        run: cd packages/local-web && npx tsc --noEmit

      - name: Build frontend
        run: cd packages/local-web && npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          VITE_POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: packages/local-web/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. Build native server/mcp/review binaries for every platform the CLI runs
  #    on. The npx CLI loader fetches the right zip from R2 at runtime.
  # ---------------------------------------------------------------------------
  build-backend:
    needs: [decide, build-frontend]
    if: needs.decide.outputs.release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            name: linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            name: linux-arm64
          - target: x86_64-pc-windows-msvc
            os: ubuntu-24.04
            name: windows-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
          - target: aarch64-pc-windows-msvc
            os: ubuntu-24.04
            name: windows-arm64
    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      SCCACHE_CACHE_SIZE: "10G"
      CARGO_HOME: ${{ github.workspace }}/.cargo
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
      XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin-cache
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup sccache
        uses: BloopAI/sccache-action@main

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install cargo-edit
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: cargo-edit
          git: https://github.com/killercup/cargo-edit
          rev: 96a3879fe3bafda6d0f943b642997fbf03e235cd # v0.13.9

      - name: Apply version
        run: node scripts/release/apply-version.js ${{ needs.decide.outputs.version }}

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: .rustup/toolchains
          key: rust-toolchain-${{ runner.os }}-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y clang libclang-dev lld llvm nasm cmake ninja-build
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y clang-19 clang-tools-19 llvm-19 lld-19
            echo "/usr/lib/llvm-19/bin" >> $GITHUB_PATH
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            .cargo/registry/cache
            .cargo/registry/index
            .cargo/git/db
            .cargo/bin
            .cargo/.crates.toml
            .cargo/.crates2.json
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-

      - name: Install Zig
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        uses: BloopAI/setup-zig@main
        with:
          version: 0.15.2

      - name: Install cargo zigbuild
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: cargo-zigbuild
          git: https://github.com/rust-cross/cargo-zigbuild
          rev: bbb57ac6a5eb90f53617a5c218fda03080599e4a # v0.20.1

      - name: Install cargo xwin
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: cargo-xwin
          git: https://github.com/rust-cross/cargo-xwin
          rev: 635a9559d49d719e79e0f60d92eb44447faf3212 # v0.20.2

      - name: Cache xwin downloads
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.xwin-cache
          key: xwin-${{ runner.os }}-${{ matrix.target }}-cargo-xwin-${{ env.CARGO_XWIN_VERSION }}

      - name: Cache target
        uses: actions/cache@v5
        with:
          path: target
          key: target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            target-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ matrix.target }}-

      - name: Setup cargo-sweep
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: cargo-sweep
          git: https://github.com/holmgr/cargo-sweep
          rev: 82f42d3593923db6fe715b299036512d91ddb35e # v0.8.0

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: packages/local-web/dist/

      - name: Build backend (Linux)
        if: runner.os == 'Linux' && !contains(matrix.target, 'windows')
        run: cargo zigbuild --release --target ${{ matrix.target }} -p server -p mcp -p review --bin server --bin cdesktop-mcp --bin review
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
          CDT_SHARED_API_BASE: ${{ secrets.CDT_SHARED_API_BASE }}
          CDT_SHARED_RELAY_API_BASE: ${{ secrets.CDT_SHARED_RELAY_API_BASE }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build backend (macOS)
        if: runner.os == 'macOS'
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=10.12
          elif [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
          fi
          cargo build --release --target ${{ matrix.target }} -p server -p mcp -p review --bin server --bin cdesktop-mcp --bin review
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
          CDT_SHARED_API_BASE: ${{ secrets.CDT_SHARED_API_BASE }}
          CDT_SHARED_RELAY_API_BASE: ${{ secrets.CDT_SHARED_RELAY_API_BASE }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build backend (Windows)
        if: runner.os == 'Linux' && contains(matrix.target, 'windows')
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-pc-windows-msvc" ]]; then
            chmod +x scripts/ring-cc-wrapper.sh scripts/clang
            export PATH="${{ github.workspace }}/scripts:$PATH"
            export RING_CC=/usr/lib/llvm-19/bin/clang
            export DEFAULT_CC=clang-cl
            export CC_aarch64_pc_windows_msvc="${{ github.workspace }}/scripts/ring-cc-wrapper.sh"
          fi
          cargo xwin build --cross-compiler clang-cl --release --target ${{ matrix.target }} -p server -p mcp -p review --bin server --bin cdesktop-mcp --bin review
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
          CDT_SHARED_API_BASE: ${{ secrets.CDT_SHARED_API_BASE }}
          CDT_SHARED_RELAY_API_BASE: ${{ secrets.CDT_SHARED_RELAY_API_BASE }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          CARGO_PROFILE_RELEASE_DEBUG: 0

      - name: Prepare binaries
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.name }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/server.exe dist/cdesktop-${{ matrix.name }}.exe
            cp target/${{ matrix.target }}/release/cdesktop-mcp.exe dist/cdesktop-mcp-${{ matrix.name }}.exe
            cp target/${{ matrix.target }}/release/review.exe dist/cdesktop-review-${{ matrix.name }}.exe
          else
            cp target/${{ matrix.target }}/release/server dist/cdesktop-${{ matrix.name }}
            cp target/${{ matrix.target }}/release/cdesktop-mcp dist/cdesktop-mcp-${{ matrix.name }}
            cp target/${{ matrix.target }}/release/review dist/cdesktop-review-${{ matrix.name }}
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-binary-${{ matrix.name }}
          path: dist/
          retention-days: 1

      - name: Sweep Cargo target cache
        shell: bash
        run: |
          cargo sweep --maxsize 10GB
          cargo sweep --time 30

  # ---------------------------------------------------------------------------
  # 4. Zip the per-platform binaries the way the npx CLI loader expects.
  # ---------------------------------------------------------------------------
  package-npx-cli:
    needs: [decide, build-frontend, build-backend]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: linux-x64
            binary: cdesktop
            mcp_binary: cdesktop-mcp
            review_binary: cdesktop-review
          - name: linux-arm64
            binary: cdesktop
            mcp_binary: cdesktop-mcp
            review_binary: cdesktop-review
          - name: windows-x64
            binary: cdesktop.exe
            mcp_binary: cdesktop-mcp.exe
            review_binary: cdesktop-review.exe
          - name: windows-arm64
            binary: cdesktop.exe
            mcp_binary: cdesktop-mcp.exe
            review_binary: cdesktop-review.exe
          - name: macos-x64
            binary: cdesktop
            mcp_binary: cdesktop-mcp
            review_binary: cdesktop-review
          - name: macos-arm64
            binary: cdesktop
            mcp_binary: cdesktop-mcp
            review_binary: cdesktop-review
    steps:
      - uses: actions/checkout@v6
      - name: Download backend binary artifact
        uses: actions/download-artifact@v7
        with:
          name: backend-binary-${{ matrix.name }}
          path: dist/
      - name: Create platform package
        run: |
          mkdir -p npx-cli/dist/${{ matrix.name }}
          mkdir cdesktop-${{ matrix.name }} cdesktop-mcp-${{ matrix.name }} cdesktop-review-${{ matrix.name }}
          cp dist/cdesktop-${{ matrix.name }}* cdesktop-${{ matrix.name }}/${{ matrix.binary }}
          cp dist/cdesktop-mcp-${{ matrix.name }}* cdesktop-mcp-${{ matrix.name }}/${{ matrix.mcp_binary }}
          cp dist/cdesktop-review-${{ matrix.name }}* cdesktop-review-${{ matrix.name }}/${{ matrix.review_binary }}
          zip -j npx-cli/dist/${{ matrix.name }}/cdesktop.zip cdesktop-${{ matrix.name }}/${{ matrix.binary }}
          zip -j npx-cli/dist/${{ matrix.name }}/cdesktop-mcp.zip cdesktop-mcp-${{ matrix.name }}/${{ matrix.mcp_binary }}
          zip -j npx-cli/dist/${{ matrix.name }}/cdesktop-review.zip cdesktop-review-${{ matrix.name }}/${{ matrix.review_binary }}
      - name: Upload platform package artifact
        uses: actions/upload-artifact@v6
        with:
          name: npx-platform-${{ matrix.name }}
          path: npx-cli/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 5. Build the macOS desktop app as a .dmg (arm64 + x64).
  # ---------------------------------------------------------------------------
  build-tauri:
    needs: [decide, build-frontend]
    if: needs.decide.outputs.release == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - tauri-target: aarch64-apple-darwin
            name: macos-arm64
            deployment-target: "11.0"
          - tauri-target: x86_64-apple-darwin
            name: macos-x64
            deployment-target: "10.13"
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment-target }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install cargo-edit
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: cargo-edit
          git: https://github.com/killercup/cargo-edit
          rev: 96a3879fe3bafda6d0f943b642997fbf03e235cd # v0.13.9

      - name: Apply version
        run: node scripts/release/apply-version.js ${{ needs.decide.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.tauri-target }}

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ matrix.tauri-target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target
        uses: actions/cache@v5
        with:
          path: target
          key: target-${{ runner.os }}-${{ matrix.tauri-target }}-${{ github.sha }}
          restore-keys: |
            target-${{ runner.os }}-${{ matrix.tauri-target }}-

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: packages/local-web/dist/

      - name: Install deps
        run: pnpm install

      - name: Build Tauri app
        run: cd crates/tauri-app && cargo tauri build --target ${{ matrix.tauri-target }} --bundles dmg
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_ENDPOINT: ${{ secrets.POSTHOG_API_ENDPOINT }}
          CDT_SHARED_API_BASE: ${{ secrets.CDT_SHARED_API_BASE }}
          CDT_SHARED_RELAY_API_BASE: ${{ secrets.CDT_SHARED_RELAY_API_BASE }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Collect DMG
        run: |
          mkdir -p tauri-out
          find target/${{ matrix.tauri-target }}/release/bundle/dmg -name "*.dmg" -exec cp {} tauri-out/cdesktop-${{ needs.decide.outputs.version }}-${{ matrix.name }}.dmg \;
          ls -la tauri-out

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: tauri-dmg-${{ matrix.name }}
          path: tauri-out/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 4. Tag, publish GitHub release, commit version bumps.
  # ---------------------------------------------------------------------------
  release:
    needs: [decide, build-tauri, package-npx-cli]
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ needs.decide.outputs.version }}
      tag: ${{ needs.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install cargo-edit
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: cargo-edit
          git: https://github.com/killercup/cargo-edit
          rev: 96a3879fe3bafda6d0f943b642997fbf03e235cd # v0.13.9

      - name: Install deps
        run: pnpm install

      - name: Download all Tauri DMGs
        uses: actions/download-artifact@v7
        with:
          pattern: tauri-dmg-*
          path: release-artifacts/
          merge-multiple: true

      - name: Download all npx platform packages
        uses: actions/download-artifact@v7
        with:
          pattern: npx-platform-*
          path: all-platforms/
          merge-multiple: true

      - name: Build per-platform npx-cli tarballs
        # The bundled cli.js detects `dist/` at runtime (LOCAL_DEV_MODE) and uses
        # the local binaries instead of fetching from the network. Each tarball
        # ships only its target platform's binaries, so brew can pick the right
        # arch.
        run: |
          cd npx-cli
          npm ci
          npm run build
          # No external CDN — leave the placeholders inert (LOCAL_DEV_MODE wins).
          sed -i 's|__R2_PUBLIC_URL__|https://invalid.local|g' bin/cli.js
          sed -i "s|__BINARY_TAG__|${{ needs.decide.outputs.tag }}|g" bin/cli.js
          mkdir -p ../release-artifacts
          for platform in macos-arm64 macos-x64 linux-x64 linux-arm64 windows-x64 windows-arm64; do
            src="../all-platforms/$platform"
            if [ ! -d "$src" ]; then
              echo "skipping $platform — no artifact"
              continue
            fi
            rm -rf dist && mkdir -p dist/$platform
            cp "$src"/*.zip "dist/$platform/"
            npm pack
            mv cdesktop-*.tgz "../release-artifacts/cdesktop-${{ needs.decide.outputs.version }}-$platform.tgz"
          done

      - name: List release artifacts
        run: ls -la release-artifacts/

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

  # ---------------------------------------------------------------------------
  # 5. Update the Homebrew tap with the freshly published cask.
  # ---------------------------------------------------------------------------
  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Update tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          TAP_REPO: Odrinateur/homebrew-tap
        run: bash scripts/release/update_homebrew_tap.sh
